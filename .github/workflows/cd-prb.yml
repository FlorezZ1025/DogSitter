name: CD - PRB

on:
  workflow_run:
    workflows:
      - "CI - PRB"
    branches:
      - develop
    types:
      - completed

jobs:
  deploy: 
    runs-on: ubuntu-latest
    environment: prb
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Trigger Render deploy
        run: |
          echo "CI passed — deploying to PRB environment..."
          curl --silent --show-error --fail \
            --request POST "${{ secrets.RENDER_DEPLOY_HOOK_PRB }}"
          echo "Deploy triggered successfully.