name: Deploy to EKS - PRB

on:
  workflow_run:
    workflows: 
      - "CI - PRB"
    branches:
      - develop
    types:
      - completed
 

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prb
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2
    
    - name: Login en ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build y push imagen Docker
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
      
      run: |
        docker build -t $ECR_REGISTRY/api-dogsitter:latest .
        docker tag $ECR_REGISTRY/api-dogsitter:latest $ECR_REGISTRY/api-dogsitter:latest
        docker push $ECR_REGISTRY/api-dogsitter:latest
        echo "IMAGE=$ECR_REGISTRY/api-dogsitter:latest" >> $GITHUB_ENV
     
    - name: Desplegar en EKS
      env:
        DB_CONNECTION_STRING: ${{ secrets.CONNECTION_STRING }}
      run: |
        aws eks update-kubeconfig --region us-east-2 --name api-dogsitter-eks

        kubectl set env deployment/api-dogsitter ConnectionStrings__db="$DB_CONNECTION_STRING"
        
        kubectl rollout restart deployment/api-dogsitter
    
        kubectl rollout status deployment/api-dogsitter
        