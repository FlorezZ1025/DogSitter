name: Deploy to EKS - PRB

on:
  workflow_run:
    workflows: 
      - "CI - PRB"
    branches:
      - develop
    types:
      - completed
 

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: prb
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
    - name: Checkout código
      uses: actions/checkout@v3

    - name: Configurar AWS credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-2

    - name: Login en ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v1

    - name: Build y push imagen Docker
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        IMAGE_TAG: ${{ github.sha }}
      run: |
        docker build -t $ECR_REGISTRY/api-dogsitter:$IMAGE_TAG .
        docker push $ECR_REGISTRY/api-dogsitter:$IMAGE_TAG
        echo "IMAGE=$ECR_REGISTRY/api-dogsitter:$IMAGE_TAG" >> $GITHUB_ENV

    - name: Desplegar en EKS
      run: |
        aws eks update-kubeconfig --region us-east-2 --name api-dogsitter-eks
        kubectl set image deployment/api-dogsitter api-dogsitter=$IMAGE
        kubectl rollout status deployment/api-dogsitter
        kubectl get deployment api-dogsitter -n $NAMESPACE -o=jsonpath='{.spec.template.spec.containers[0].image}'
        echo